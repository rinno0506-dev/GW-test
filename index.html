const GW_PAST_QUESTIONS = GW_QUIZ_BUNDLE.pastQuestions;
const GW_PREDICTED_QUESTIONS = GW_QUIZ_BUNDLE.predictedQuestions;
const GW_STUDY_LISTS = GW_QUIZ_BUNDLE.studyLists;


const GW_ALL_QUESTIONS = [...GW_PAST_QUESTIONS, ...GW_PREDICTED_QUESTIONS];


// 既存HTMLが questions という変数を読む場合は、この1行を使ってください。
// 既存HTML側で questions を既に宣言している場合は、この行だけコメントアウトしてください。
const questions = GW_ALL_QUESTIONS;


function getGwQuestionsByCategory(category) {
  return GW_ALL_QUESTIONS.filter(q => q.category === category);
}


function getGwQuestionsByType(type) {
  return GW_ALL_QUESTIONS.filter(q => q.type === type);
}


  
// ===== 変数 =====
let questions=[],i=0,score=0,sel=[];
let wrongList = []; // ←追加（global）
let usedQuestions = []; // ←追加

// ===== シャッフル =====
function shuffle(arr){
  for(let x=arr.length-1;x>0;x--){
    let j=Math.floor(Math.random()*(x+1));
    [arr[x],arr[j]]=[arr[j],arr[x]];
  }
}

// ===== スタート =====
function start(){
  let count=parseInt(document.getElementById("count").value);

  questions=[];
  usedQuestions = []; // ←初回リセット

  let available = [...base];

  shuffle(available);

  questions = available.slice(0,count);

  usedQuestions = questions.map(q => q.q);

  i=0;
  score=0;
  wrongList=[];

  document.getElementById("setup").style.display="none";
  document.getElementById("quiz").style.display="block";

  show();
}
// ===== 表示 =====
function show(){
  let q=questions[i];
  sel=[];

  document.getElementById("q").innerHTML="Q"+(i+1)+"："+q.q;

  let html="";
  q.a.forEach((opt,n)=>{
    html+=`<button class="btn" onclick="selectAnswer(this,${n})">${opt}</button>`;
  });

  document.getElementById("a").innerHTML=html;
  document.getElementById("ex").innerHTML="";
  document.getElementById("nextBtn").style.display="none";
}

// ===== 選択 =====
function selectAnswer(btn,n){
  let q=questions[i];

  if(q.multi){
    if(sel.includes(n)){
      sel=sel.filter(x=>x!==n);
      btn.classList.remove("selected");
    }else{
      sel.push(n);
      btn.classList.add("selected");
    }
  }else{
    sel=[n];
    document.querySelectorAll(".btn").forEach(b=>b.classList.remove("selected"));
    btn.classList.add("selected");
  }
}

// ===== 回答 =====
function submitAnswer(){
  if(sel.length===0){
    alert("選択して！");
    return;
  }

  let q=questions[i];
  let ok=JSON.stringify([...sel].sort())===JSON.stringify(q.correct);

  document.querySelectorAll(".btn").forEach((b,n)=>{
    if(q.correct.includes(n)) b.classList.add("correct");
    if(sel.includes(n)&&!q.correct.includes(n)) b.classList.add("wrong");
    b.disabled=true;
  });

  if(ok){
    score++;
    document.getElementById("ex").innerHTML="✅ 正解！";
  }else{
    document.getElementById("ex").innerHTML="❌ 不正解！";

    // ✅ 間違い保存
    wrongList.push({
      question: q.q,
      answers: q.a,
      correct: q.correct
    });
  }

  document.getElementById("nextBtn").style.display="block";
}

// ===== 次へ =====
function nextQuestion(){
  i++;

  if(i<questions.length){
    show();
  }else{
    document.getElementById("quiz").style.display="none";
    document.getElementById("result").style.display="block";
    document.getElementById("retryNewBtn").style.display="block";

    let html = "<h3>スコア："+score+"/"+questions.length+"</h3>";

    if(wrongList.length > 0){
      html += "<h4>❌ 間違えた問題</h4>";

      wrongList.forEach((w,index)=>{
        html += "<div style='margin-bottom:20px;'>";

        html += "<b>Q"+(index+1)+"："+w.question+"</b><br>";

        w.answers.forEach((a,i)=>{
          if(w.correct.includes(i)){
            html += "✅ "+a+"<br>";
          }else{
            html += "・"+a+"<br>";
          }
        });

        html += "</div>";
      });

// ✅ ボタン表示ON
  document.getElementById("retryBtn").style.display="block";


    }else{
      html += "<p>🎉 全問正解！！</p>";
    }

    document.getElementById("result").innerHTML = html;
  }
}
 // ===== 間違い問題だけ再挑戦 =====
function retryWrong(){

  if(wrongList.length === 0){
    return;
  }

  // 間違えた問題だけにする
  questions = wrongList.map(w => ({
    q: w.question,
    a: w.answers,
    correct: w.correct,
    multi: w.correct.length > 1
  }));

  // 状態リセット
  i = 0;
  score = 0;
  wrongList = [];

  // 画面切替
  document.getElementById("result").style.display="none";
  document.getElementById("quiz").style.display="block";
  document.getElementById("retryBtn").style.display="none";

  show();
}
// ===== 別問題でもう一回 =====
function retryNew(){

  let count = questions.length;

  // 前回使ってない問題だけ抽出
  let filtered = base.filter(q => !usedQuestions.includes(q.q));

  // 足りなかったら全体
  if(filtered.length < count){
    filtered = [...base];
  }

  shuffle(filtered);

  questions = filtered.slice(0,count);

  // 履歴更新
  usedQuestions = usedQuestions.concat(questions.map(q=>q.q));

  i=0;
  score=0;
  wrongList=[];

  // 画面切替
  document.getElementById("result").style.display="none";
  document.getElementById("quiz").style.display="block";
  document.getElementById("retryNewBtn").style.display="none";
  document.getElementById("retryBtn").style.display="none";

  show();
}
